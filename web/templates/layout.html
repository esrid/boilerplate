{{define "layout"}}
<!DOCTYPE html>
<html lang="en" data-theme="light" class="transition-colors duration-200">
  <head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{csrfToken}}">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {{block "script" .}} {{end}}
    <script src="/static/js/turbo.js" defer type="application/javascript"></script>
    <script src="/static/js/layout.js" defer type="application/javascript"></script>
    <link href="/static/css/style.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <title>{{block "title" .}} App {{end}}</title>
    <script>
      // Initialize theme before page renders to prevent flash
      (function() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        const html = document.documentElement;
        html.setAttribute('data-theme', savedTheme);
        if (savedTheme === 'dark') {
          html.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="min-h-screen bg-base-100 text-base-content">
    <!-- Navigation -->
    {{if .Connected}}
    <!-- User Menu for Connected Users -->
    <div class="navbar bg-base-200 shadow-sm">
      <div class="navbar-start">
        <a href="/" class="btn btn-ghost text-xl text-primary">Step by Step</a>
      </div>
      <div class="navbar-end">
        <!-- Theme Toggle -->
        <div data-controller="theme" class="mr-2">
          <button data-theme-target="toggle" 
                  data-action="theme#toggleTheme"
                  class="btn btn-ghost btn-circle"
                  title="Toggle theme">
            <!-- Sun icon (light mode) -->
            <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
            </svg>
            <!-- Moon icon (dark mode) -->
            <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
            </svg>
          </button>
        </div>
        <a href="/app" class="btn btn-ghost">Dashboard</a>
        <div class="dropdown dropdown-end">
          <div tabindex="0" role="button" class="btn btn-ghost">
            Account
            <svg class="ml-1 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </div>
          <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box z-50 w-52 p-2 shadow">
            <li><a href="/settings">Account Settings</a></li>
            <li><a href="/profile">Profile</a></li>
            <div class="divider my-1"></div>
            <li><a href="/logout">Sign Out</a></li>
          </ul>
        </div>
      </div>
    </div>
    {{else}}
    <!-- Login/Signup Navbar for Non-Connected Users -->
    <div class="navbar bg-base-200 shadow-sm">
      <div class="navbar-start">
        <a href="/" class="btn btn-ghost text-xl text-primary">Step by Step</a>
      </div>
      <div class="navbar-end">
        <!-- Theme Toggle -->
        <div data-controller="theme" class="mr-2">
          <button data-theme-target="toggle" 
                  data-action="theme#toggleTheme"
                  class="btn btn-ghost btn-circle"
                  title="Toggle theme">
            <!-- Sun icon (light mode) -->
            <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
            </svg>
            <!-- Moon icon (dark mode) -->
            <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
            </svg>
          </button>
        </div>
        <a href="/#features" class="btn btn-ghost">Features</a>
        <a href="/#pricing" class="btn btn-ghost">Pricing</a>
        <a href="/auth/login" class="btn btn-ghost">Sign In</a>
        <a href="/auth/signup" class="btn btn-primary">Get Started</a>
      </div>
    </div>
    {{end}}
    
    {{template "content" .}}
    
  </body>
</html>
{{end}}
